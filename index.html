<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinévia</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo">
           <a href="index.html">
            <img src="images/CINEVIALOGO-01 (1).png" alt="Cinévia" width="200">
        </a>
        </div>
        <ul class="nav-links">
            <li><a href="#">Accueil</a></li>
            <li><a href="#movies-container">Films</a></li>
            <li><a href="#fav">Favoris</a></li>
        </ul>
         <div class="search-box">
    <input type="text" placeholder="Rechercher...">
  </div>
    </nav>
    <section class="hero">
        <div class="overlay"></div>
        <div class="hero-content">
            <h1>Découvrez les meilleurs films<br />
            Explorez, recherchez et ajoutez vos films préférés</h1>
            <a href="#movies-container" class="hero-btn">Explorer maintenant</a>
        </div>
    </section>
    <div class="categories">
  <button class="cat-btn">Tous</button>
  <button class="cat-btn">Action</button>
  <button class="cat-btn">Comédie</button>
  <button class="cat-btn">Drame</button>
</div>

<div id="movies-container"></div>
  

<h2 class="fav-h3" id="fav">Mes Favoris 🔖</h2>
<section class="favorites"></section>


<div id="overlay" class="overlay">
  <div class="modal">
    <span id="closeBtn">&times;</span>

    <div class="modal-body">
      <!-- LEFT -->
      <div class="modal-left">
        <img id="modalImg" />
      </div>

      <!-- RIGHT -->
      <div class="modal-right">
        <h2 id="modalTitle"></h2>
        <p id="modalDesc"></p>

        <span id="modalCategory" class="tag"></span>

        <button id="favBtn">Ajouter aux favoris ❤️</button>
      </div>
    </div>
  </div>
</div>



 <footer class="footer">
  <div class="footer-bottom">
    © 2026 Cinévia. Tous droits réservés.
  </div>
</footer>



<script src="app.js"></script>
</body>
</html>
